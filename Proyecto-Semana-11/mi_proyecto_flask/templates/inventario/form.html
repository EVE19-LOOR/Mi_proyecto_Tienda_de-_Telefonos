{% extends "base.html" %}

{% block title %}{{ titulo }} | Tienda de Teléfonos{% endblock %}

{% block content %}
<h1>{{ titulo }}</h1>

<form method="POST">
  <label>Nombre:</label><br>
  <input type="text" name="nombre" value="{{ p.nombre if p else '' }}" required><br><br>

  <label>Marca:</label><br>
  <input type="text" name="marca" value="{{ p.marca if p else '' }}" required><br><br>

  <label>Modelo:</label><br>
  <input type="text" name="modelo" value="{{ p.modelo if p else '' }}" required><br><br>

  <label>Categoría:</label><br>
  <input type="text" name="categoria" value="{{ p.categoria if p else '' }}" required><br><br>

  <label>Cantidad:</label><br>
  <input type="number" name="cantidad" min="0" value="{{ p.cantidad if p else 0 }}" required><br><br>

  <label>Precio:</label><br>
  <input type="number" step="0.01" name="precio" min="0" value="{{ p.precio if p else 0 }}" required><br><br>

  <button type="submit">Guardar</button>
  <a href="{{ url_for('inventario_list') }}">Volver</a>
</form>

{% if error %}
  <p>{{ error }}</p>
{% endif %}

{% endblock %}
