{% extends 'base.html' %}

{% block title %}Editar celular{% endblock %}

{% block content %}
<h2 class="mb-4">Editar celular</h2>

<form method="POST">
    <div class="mb-3">
        <label>Nombre</label>
        <input type="text" name="nombre" class="form-control" value="{{ producto['nombre'] }}" required>
    </div>

    <div class="mb-3">
        <label>Marca</label>
        <input type="text" name="marca" class="form-control" value="{{ producto['marca'] }}" required>
    </div>

    <div class="mb-3">
        <label>Precio</label>
        <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto['precio'] }}" required>
    </div>

    <div class="mb-3">
        <label>Stock</label>
        <input type="number" name="stock" class="form-control" min="0" value="{{ producto['stock'] }}" required>
    </div>

    <button type="submit" class="btn btn-primary">Actualizar</button>
    <a href="{{ url_for('listar_productos') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
