<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingreso al Sistema</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family: Arial, Helvetica, sans-serif;
}

.login-container{
width:420px;
}

.card{
border:none;
border-radius:15px;
box-shadow:0px 10px 25px rgba(0,0,0,0.3);
}

.card-header{
background: linear-gradient(90deg,#1e3c72,#2a5298);
color:white;
text-align:center;
font-weight:bold;
font-size:20px;
border-radius:15px 15px 0 0;
}

.logo{
text-align:center;
margin-bottom:15px;
}

.logo img{
width:80px;
}

.btn-primary{
background: linear-gradient(90deg,#1e3c72,#2a5298);
border:none;
}

.btn-primary:hover{
background: linear-gradient(90deg,#2a5298,#1e3c72);
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:#555;
}

.titulo{
text-align:center;
color:white;
margin-bottom:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="login-container">

<div class="titulo">
<h3>Tienda de Celulares</h3>
Sistema de Gestión Web
</div>

<div class="card">

<div class="card-header">
Ingreso al Sistema
</div>

<div class="card-body">

<div class="logo">
<img src="https://cdn-icons-png.flaticon.com/512/15/15874.png">
</div>

<form method="POST">

<div class="mb-3">
<label>Correo</label>
<input type="email" name="correo" class="form-control" required>
</div>

<div class="mb-3">
<label>Clave</label>
<input type="password" name="clave" class="form-control" required>
</div>

<button class="btn btn-primary w-100">
Ingresar
</button>

</form>

<div class="footer">
Desarrollado por Evelin Stefania Loor Velásquez  
<br>
Materia: Desarrollo de Aplicaciones Web (B)
</div>

</div>

</div>

</div>

</body>
</html>
